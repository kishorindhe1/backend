<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{subject}}</title>
  <!--
    BASE LAYOUT — not rendered directly.
    All email templates extend this structure.

    Brand colours:
      Primary:   #00C8A0
      Dark:      #0891B2
      Text:      #1E293B
      Muted:     #64748B
      Light bg:  #F8FAFC
      Border:    #E2E8F0
  -->
</head>
<body style="margin:0;padding:0;background:#F8FAFC;font-family:'Segoe UI',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#F8FAFC;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background:#FFFFFF;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);">

          <!-- HEADER -->
          <tr>
            <td style="background:linear-gradient(135deg,#00C8A0 0%,#0891B2 100%);padding:32px 40px;text-align:center;">
              <span style="font-size:28px;font-weight:900;color:#FFFFFF;letter-spacing:-0.5px;">Upcharify</span>
              <p style="margin:4px 0 0;color:rgba(255,255,255,0.8);font-size:13px;">Your Health, Our Priority</p>
            </td>
          </tr>

          <!-- CONTENT SLOT -->
          <tr>
            <td style="padding:40px;">
              {{content}}
            </td>
          </tr>

          <!-- FOOTER -->
          <tr>
            <td style="background:#F8FAFC;border-top:1px solid #E2E8F0;padding:24px 40px;text-align:center;">
              <p style="margin:0 0 8px;color:#64748B;font-size:12px;">Need help? Contact us at <a href="mailto:support@upcharify.com" style="color:#00C8A0;text-decoration:none;">support@upcharify.com</a></p>
              <p style="margin:0;color:#94A3B8;font-size:11px;">© 2026 Upcharify · Nashik, Maharashtra · <a href="#" style="color:#94A3B8;">Unsubscribe</a></p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
